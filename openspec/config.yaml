schema: spec-driven

context: |
  Project state: Angular and FastAPI foundations are scaffolded under frontend/ and backend/.
  Frontend: Angular 22, standalone APIs, strict mode, zoneless change detection, Tailwind CSS, Angular Aria.
  Backend: FastAPI with Pydantic, managed with Python 3.13 and Poetry.
  Testing: Angular unit-test builder backed by Vitest and pytest are proved; Playwright is configured but its browser runtime remains unproved until sdd-verify.
  Product: a public portfolio with an informational chat grounded in CV and project data.
  Runtime MCP is excluded unless a later requirement demonstrates a concrete need.

strict_tdd: true

testing:
  detected_at: 2026-07-22
  status: available
  runtime:
    node: 24.15.0
    npm: 11.12.1
    python: 3.13.14
  commands:
    frontend_unit_scoped:
      cwd: frontend
      run: npm test -- --include=src/app/app.spec.ts --watch=false
    frontend_build:
      cwd: frontend
      run: npm run build
    backend_test_scoped:
      cwd: backend
      run: poetry run python -m pytest tests/test_health.py -q
    backend_lint:
      cwd: backend
      run: poetry run ruff check app tests --output-format=concise
    backend_type_check:
      cwd: backend
      run: poetry run mypy app
    backend_project_check:
      cwd: backend
      run: poetry check --lock
  e2e:
    package: "@playwright/test@1.61.1"
    config: frontend/playwright.config.ts
    status: unproven
    reason: Browser installation and Playwright execution are intentionally deferred to sdd-verify.
  detected:
    test_runner: Vitest and pytest
    test_command:
      frontend:
        cwd: frontend
        run: npm test -- --include=<spec-path> --watch=false
      backend:
        cwd: backend
        run: poetry run python -m pytest <test-path> -q
    unit: true
    integration: true
    e2e: false
    coverage: false
    linter: true
    type_checker: true
    formatter: false

rules:
  proposal:
    - Keep the first slice focused on measurable portfolio outcomes.
    - Document product tradeoffs and non-goals.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
  design:
    - Preserve the frontend/backend boundary and document data contracts.
    - Include sequence diagrams for complex flows.
    - Record architecture decisions with rationale.
  tasks:
    - Group tasks by phase and use hierarchical numbering.
    - Distinguish scaffolding, product behavior, and verification work.
  apply:
    - Follow existing code patterns after scaffolding establishes them.
    - Do not add runtime MCP without an approved requirement and design rationale.
    tdd: true
    test_command:
      frontend:
        cwd: frontend
        run: npm test -- --include=<spec-path> --watch=false
      backend:
        cwd: backend
        run: poetry run python -m pytest <test-path> -q
  verify:
    test_command:
      frontend:
        cwd: frontend
        run: npm test -- --include=<spec-path> --watch=false
      backend:
        cwd: backend
        run: poetry run python -m pytest <test-path> -q
      e2e:
        cwd: frontend
        run: npm run test:e2e
        gate: Run only during explicit sdd-verify after browser installation.
    build_command:
      cwd: frontend
      run: npm run build
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.
